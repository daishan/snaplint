name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Check for version bump on src changes
        if: github.event_name == 'pull_request'
        run: |
          # Check if there are changes in src/
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^src/'; then
            # Check if version was changed
            if git diff origin/${{ github.base_ref }}...HEAD pyproject.toml | grep -q '^[+-]version = '; then
              echo "✓ Version bumped in pyproject.toml"
            else
              echo "❌ Changes detected in src/ but version was not bumped in pyproject.toml"
              echo "Please update the version in pyproject.toml"
              exit 1
            fi
          else
            echo "✓ No changes in src/, version bump not required"
          fi
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --extra dev
      - name: Check uv.lock is up-to-date
        run: |
          uv lock --check
      - name: Lint with ruff
        run: |
          uv run ruff check src
      - name: Check code format with black
        run: |
          uv run black --check src tests
      - name: Type check with mypy
        run: |
          uv run mypy --strict src
      - name: Test with pytest
        run: |
          uv run pytest

  tag-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      tag_created: ${{ steps.create_tag.outputs.created }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.get_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        id: create_tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.get_version.outputs.tag }}" -m "Release ${{ steps.get_version.outputs.tag }}"
          git push origin "${{ steps.get_version.outputs.tag }}"
          echo "created=true" >> $GITHUB_OUTPUT

  build-release:
    needs: tag-release
    runs-on: ubuntu-latest
    if: needs.tag-release.outputs.tag_created == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.tag-release.outputs.version }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    environment: pypi-production
    permissions:
      id-token: write # Required for trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
      # Uses trusted publishing - configure at https://pypi.org/manage/account/publishing/
      # No API token needed when using trusted publishing
